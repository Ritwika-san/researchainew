<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResearchAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #1a1a2e; }
        .navbar-brand { color: #e94560 !important; font-weight: bold; }
        .btn-primary { background-color: #e94560; border: none; }
        .btn-primary:hover { background-color: #c73652; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-4 py-3">
        <span class="navbar-brand">ResearchAI</span>
        {% if user.is_authenticated %}
        <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
        {% endif %}
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
