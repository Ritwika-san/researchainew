{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        
        <div class="card p-4 mb-4">
            <h4 class="mb-3">Research a Topic</h4>
            <div class="mb-3">
                <textarea class="form-control" id="topicInput" rows="3" 
                    placeholder="Enter a research topic... e.g. 'Climate change effects on agriculture'"></textarea>
            </div>
            <button class="btn btn-primary" id="researchBtn" onclick="doResearch()">
                Research this topic
            </button>
        </div>

        <div id="resultCard" class="card p-4 mb-4" style="display:none;">
            <h5 id="resultTopic" class="mb-3"></h5>
            <div id="resultText" style="white-space: pre-wrap; line-height: 1.8;"></div>
        </div>

        {% if queries %}
        <div class="card p-4">
            <h5 class="mb-3">Your Research History</h5>
            {% for query in queries %}
            <div class="border-bottom pb-2 mb-2">
                <small class="text-muted">{{ query.created_at|date:"d M Y, H:i" }}</small>
                <p class="mb-1 fw-bold">{{ query.topic }}</p>
                <p class="text-muted small">{{ query.result|truncatechars:150 }}</p>
            </div>
            {% endfor %}
        </div>
        {% endif %}

    </div>
</div>

<script>
async function doResearch() {
    const topic = document.getElementById('topicInput').value.trim()
    const btn = document.getElementById('researchBtn')
    const resultCard = document.getElementById('resultCard')
    const resultTopic = document.getElementById('resultTopic')
    const resultText = document.getElementById('resultText')

    if (!topic) {
        alert('Please enter a topic!')
        return
    }

    btn.disabled = true
    btn.innerHTML = 'Researching... please wait'
    resultCard.style.display = 'none'

    const formData = new FormData()
    formData.append('topic', topic)
    formData.append('csrfmiddlewaretoken', '{{ csrf_token }}')

    try {
        const response = await fetch('/research/research/', {
            method: 'POST',
            body: formData
        })

        const data = await response.json()

        if (data.success) {
            resultTopic.innerHTML = 'Results for: <strong>' + data.topic + '</strong>'
            resultText.textContent = data.result
            resultCard.style.display = 'block'
        } else {
            alert('Error: ' + data.error)
        }

    } catch (error) {
        alert('Something went wrong. Please try again.')
    }

    btn.disabled = false
    btn.innerHTML = 'Research this topic'
}
</script>
{% endblock %}
