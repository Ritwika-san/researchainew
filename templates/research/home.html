{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card p-4">
            <h4>Welcome, {{ user.email }}</h4>
            <p class="text-muted">Your AI research assistant is ready.</p>
            <hr>
            <div class="mb-3">
                <textarea class="form-control" rows="3" placeholder="Enter a research topic..."></textarea>
            </div>
            <button class="btn btn-primary">Research this topic</button>
        </div>
    </div>
</div>
{% endblock %}
